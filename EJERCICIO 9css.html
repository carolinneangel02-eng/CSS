<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HERENCIA DE ESTILOS</title>

    <style>
        body {
            color: rgb(59, 3, 245);
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }

        em {
            color: rgb(86, 83, 87);
        }

        p {
            color: rgb(5, 5, 5);
        }
    </style>
</head>

<body>

    <h1>HERENCIA DE ESTILOS CON <em>argomaster</em></h1>

    <p>
        Este es un parrafo de ejemplo para demostrar la herencia de estilos en
        CSS. El color y la fuente se aplican automaticamente a este texto debido a
        la herencia desde el elemento body.
    </p>

</body>
</html>
